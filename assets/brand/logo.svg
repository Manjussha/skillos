<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SkillOS logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1220"/>
      <stop offset="1" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="200" x2="392" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)" stroke="#1f2a3c" stroke-width="3"/>

  <!-- neural spark: a few connected nodes implying AI -->
  <g stroke="#22d3ee" stroke-width="4" opacity="0.55">
    <line x1="300" y1="150" x2="360" y2="120"/>
    <line x1="360" y1="120" x2="392" y2="178"/>
    <line x1="300" y1="150" x2="392" y2="178"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="300" cy="150" r="9"/>
    <circle cx="360" cy="120" r="9"/>
    <circle cx="392" cy="178" r="9"/>
  </g>

  <!-- terminal prompt ">_" -->
  <g filter="url(#glow)" stroke="url(#accent)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="150,196 250,272 150,348"/>
  </g>
  <rect x="286" y="330" width="118" height="30" rx="15" fill="#22d3ee" filter="url(#glow)"/>
</svg>
